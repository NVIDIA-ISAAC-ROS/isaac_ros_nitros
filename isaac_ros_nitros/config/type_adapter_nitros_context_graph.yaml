---
name: memory_pool
components:
- name: unbounded_allocator
  type: nvidia::gxf::UnboundedAllocator
---
name: cuda_stream_pool
components:
- name: stream
  type: nvidia::gxf::CudaStreamPool
  parameters:
    stream_flags: 1
    stream_priority: 0
    reserved_size: 3
    max_size: 3
    nvtx_identifier: "nitros_type_adapter_stream_pool"
---
#############
# Pose Tree #
#############
name: global_pose_tree
components:
  - name: pose_tree
    type: nvidia::isaac::PoseTree
  - type: nvidia::isaac::PoseTreeSetup
    parameters:
      pose_tree: global_pose_tree/pose_tree
  - name: world_frame
    type: nvidia::isaac::PoseTreeFrame
    parameters:
      pose_tree: global_pose_tree/pose_tree
  - name: map_frame
    type: nvidia::isaac::PoseTreeFrame
    parameters:
      pose_tree: global_pose_tree/pose_tree
      parent_frame: global_pose_tree/world_frame
      initial_pose:
        translation: [0.0, 0.0, 0.0]
        rotation_rpy: [0.0, 0.0, 0.0]
  - name: robot_frame
    type: nvidia::isaac::PoseTreeFrame
    parameters:
      pose_tree: global_pose_tree/pose_tree
      parent_frame: global_pose_tree/world_frame
      initial_pose:
        translation: [0.0, 0.0, 0.0]
        rotation_rpy: [0.0, 0.0, 0.0]
  - name: composite_schema_server
    type: nvidia::isaac::CompositeSchemaServer
